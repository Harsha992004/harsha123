<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ For Someone Special</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Pacifico&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow: hidden;
            height: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #f093fb, #667eea);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: none;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 50%; }
            50% { background-position: 0% 100%; }
            75% { background-position: 100% 0%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating hearts background animation */
        .heart-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .floating-heart {
            position: absolute;
            font-size: 25px;
            opacity: 0.7;
            animation: floatUp 10s infinite ease-in-out;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
        }

        @keyframes floatUp {
            0% {
                transform: translateY(120vh) translateX(0) rotate(0deg) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.9;
            }
            90% {
                opacity: 0.9;
            }
            100% {
                transform: translateY(-10vh) translateX(50px) rotate(720deg) scale(1.5);
                opacity: 0;
            }
        }

        /* Sparkles animation */
        .sparkle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: white;
            border-radius: 50%;
            animation: sparkle 2s infinite ease-in-out;
            box-shadow: 0 0 15px #fff, 0 0 25px #fff, 0 0 35px #fff;
        }

        @keyframes sparkle {
            0%, 100% { 
                opacity: 0; 
                transform: scale(0) rotate(0deg); 
            }
            50% { 
                opacity: 1; 
                transform: scale(1.5) rotate(180deg); 
            }
        }

        /* Glowing orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,105,180,0.3) 50%, transparent 70%);
            animation: orbFloat 15s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes orbFloat {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            25% {
                transform: translate(100px, -100px) scale(1.2);
                opacity: 0.6;
            }
            50% {
                transform: translate(-100px, -200px) scale(0.8);
                opacity: 0.4;
            }
            75% {
                transform: translate(150px, -50px) scale(1.1);
                opacity: 0.5;
            }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 35px;
            border-radius: 40px;
            box-shadow: 
                0 8px 32px 0 rgba(31, 38, 135, 0.37),
                0 0 0 1px rgba(255, 255, 255, 0.18),
                inset 0 0 50px rgba(255, 255, 255, 0.1);
            max-width: 650px;
            width: 90%;
            max-height: 95vh;
            overflow: hidden;
            position: relative;
            z-index: 2;
            animation: fadeInScale 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff6ec4, #7873f5, #4facfe, #00f2fe, #ff6ec4);
            background-size: 300%;
            border-radius: 40px;
            z-index: -1;
            animation: borderGlow 3s linear infinite;
            opacity: 0.6;
        }

        @keyframes borderGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.5) rotateY(90deg);
            }
            50% {
                transform: scale(1.05) rotateY(0deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateY(0deg);
            }
        }

        h1 {
            color: #ffffff;
            font-size: 32px;
            margin-bottom: 35px;
            font-weight: 700;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(255, 105, 180, 0.6),
                0 0 30px rgba(255, 105, 180, 0.4),
                2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: glowPulse 3s ease-in-out infinite, floatText 4s ease-in-out infinite;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 1px;
        }

        @keyframes glowPulse {
            0%, 100% { 
                text-shadow: 
                    0 0 10px rgba(255, 255, 255, 0.8),
                    0 0 20px rgba(255, 105, 180, 0.6),
                    0 0 30px rgba(255, 105, 180, 0.4),
                    2px 2px 4px rgba(0, 0, 0, 0.3);
                transform: scale(1);
            }
            50% { 
                text-shadow: 
                    0 0 20px rgba(255, 255, 255, 1),
                    0 0 30px rgba(255, 105, 180, 0.8),
                    0 0 40px rgba(255, 105, 180, 0.6),
                    0 0 50px rgba(255, 105, 180, 0.4),
                    2px 2px 4px rgba(0, 0, 0, 0.3);
                transform: scale(1.03);
            }
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Photo slideshow */
        .slideshow-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 450px;
            margin: 0 auto 35px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
            border: 5px solid rgba(255, 255, 255, 0.3);
            background: linear-gradient(135deg, #ffeef8 0%, #fff5f7 50%, #ffe5f1 100%);
            animation: photoFloat 6s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        @keyframes photoFloat {
            0%, 100% {
                transform: translateY(0px) rotateX(0deg);
                box-shadow: 
                    0 20px 60px rgba(0, 0, 0, 0.4),
                    0 0 0 1px rgba(255, 255, 255, 0.2);
            }
            50% {
                transform: translateY(-15px) rotateX(2deg);
                box-shadow: 
                    0 30px 80px rgba(0, 0, 0, 0.5),
                    0 0 0 1px rgba(255, 255, 255, 0.3);
            }
        }

        .slideshow-container::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: linear-gradient(45deg, #ff6ec4, #7873f5, #4facfe, #00f2fe);
            border-radius: 30px;
            z-index: -1;
            animation: rotateBorder 4s linear infinite;
            opacity: 0.5;
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideZoom 5s ease-in-out;
        }

        .slide.active {
            opacity: 1;
            animation: slideZoom 5s ease-in-out;
        }

        @keyframes slideZoom {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            filter: brightness(1.05) saturate(1.1);
            transition: filter 0.3s ease;
        }

        .slide.active img {
            filter: brightness(1.1) saturate(1.15);
        }

        /* Buttons */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 35px;
            margin-top: 45px;
            flex-wrap: wrap;
            position: relative;
            min-height: 80px;
        }

        button {
            padding: 18px 45px;
            font-size: 22px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.3),
                inset 0 -3px 0 rgba(0, 0, 0, 0.2);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 1px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button span {
            position: relative;
            z-index: 1;
        }

        #yesBtn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            animation: yesGlow 2s ease-in-out infinite;
        }

        @keyframes yesGlow {
            0%, 100% {
                box-shadow: 
                    0 10px 30px rgba(245, 87, 108, 0.4),
                    0 0 20px rgba(245, 87, 108, 0.2),
                    inset 0 -3px 0 rgba(0, 0, 0, 0.2);
            }
            50% {
                box-shadow: 
                    0 15px 40px rgba(245, 87, 108, 0.6),
                    0 0 40px rgba(245, 87, 108, 0.4),
                    inset 0 -3px 0 rgba(0, 0, 0, 0.2);
            }
        }

        #yesBtn:hover {
            transform: scale(1.15) translateY(-5px);
            box-shadow: 
                0 20px 50px rgba(245, 87, 108, 0.7),
                0 0 60px rgba(245, 87, 108, 0.5);
        }

        #yesBtn:active {
            transform: scale(1.05) translateY(-2px);
        }

        #noBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            position: relative;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 10;
        }

        #noBtn:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 
                0 15px 40px rgba(118, 75, 162, 0.5),
                0 0 30px rgba(118, 75, 162, 0.3);
        }

        /* Message display */
        .message {
            margin-top: 25px;
            font-size: 20px;
            color: #ffffff;
            font-weight: 600;
            min-height: 35px;
            animation: messageFadeIn 0.5s ease;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.5),
                2px 2px 10px rgba(0, 0, 0, 0.3);
            font-family: 'Poppins', sans-serif;
        }

        @keyframes messageFadeIn {
            from { 
                opacity: 0;
                transform: translateY(-10px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }
            min-height: 30px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Popup modal */
        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0) rotate(180deg);
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 50px 60px;
            border-radius: 35px;
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.5),
                0 0 0 2px rgba(255, 255, 255, 0.3),
                inset 0 0 30px rgba(255, 255, 255, 0.2);
            z-index: 1000;
            text-align: center;
            animation: popupShow 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
            border: 3px solid rgba(255, 255, 255, 0.4);
        }

        .popup.show {
            display: block;
        }

        @keyframes popupShow {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(180deg);
                opacity: 0;
            }
            70% {
                transform: translate(-50%, -50%) scale(1.1) rotate(-10deg);
            }
            100% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .popup h2 {
            color: white;
            font-size: 38px;
            margin-bottom: 25px;
            font-weight: 700;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.5),
                2px 2px 8px rgba(0, 0, 0, 0.3);
            animation: popupTextPulse 1.5s ease-in-out infinite;
        }

        @keyframes popupTextPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .popup p {
            color: white;
            font-size: 22px;
            margin-bottom: 35px;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.2);
            line-height: 1.6;
        }

        .popup button {
            background: white;
            color: #f5576c;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .popup button:hover {
            transform: scale(1.15) translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        /* Overlay */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 999;
            animation: overlayFadeIn 0.4s ease;
        }

        @keyframes overlayFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .overlay.show {
            display: block;
        }

        /* Celebration hearts */
        .celebration-heart {
            position: fixed;
            font-size: 50px;
            pointer-events: none;
            z-index: 1001;
            animation: celebrate 3s ease-out forwards;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8));
        }

        @keyframes celebrate {
            0% {
                transform: translateY(0) scale(0) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: translateY(-200px) scale(1.3) rotate(180deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-300px) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }

        /* Final message */
        .final-message {
            display: none;
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 240, 245, 0.95) 100%);
            backdrop-filter: blur(10px);
            padding: 25px 50px;
            border-radius: 25px;
            box-shadow: 
                0 15px 50px rgba(0, 0, 0, 0.4),
                0 0 0 2px rgba(255, 105, 180, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.5);
            z-index: 1002;
            font-size: 24px;
            color: #f5576c;
            font-weight: 700;
            animation: slideDown 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.3);
            border: 2px solid rgba(255, 105, 180, 0.4);
        }

        .final-message.show {
            display: block;
            animation: slideDown 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55), messagePulse 2s ease-in-out 1s infinite;
        }

        @keyframes slideDown {
            0% {
                transform: translateX(-50%) translateY(-150px) rotate(-10deg);
                opacity: 0;
            }
            70% {
                transform: translateX(-50%) translateY(10px) rotate(5deg);
            }
            100% {
                transform: translateX(-50%) translateY(0) rotate(0deg);
                opacity: 1;
            }
        }

        @keyframes messagePulse {
            0%, 100% {
                transform: translateX(-50%) scale(1);
                box-shadow: 
                    0 15px 50px rgba(0, 0, 0, 0.4),
                    0 0 0 2px rgba(255, 105, 180, 0.3);
            }
            50% {
                transform: translateX(-50%) scale(1.05);
                box-shadow: 
                    0 20px 60px rgba(0, 0, 0, 0.5),
                    0 0 0 3px rgba(255, 105, 180, 0.5),
                    0 0 30px rgba(255, 105, 180, 0.4);
            }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
                width: 95%;
                max-height: 96vh;
            }

            h1 {
                font-size: 22px;
                margin-bottom: 20px;
                line-height: 1.4;
            }

            .slideshow-container {
                height: 320px;
                max-width: 100%;
            }

            button {
                padding: 15px 35px;
                font-size: 19px;
            }

            .button-container {
                gap: 18px;
                min-height: 70px;
            }

            .popup {
                padding: 30px 40px;
                width: 90%;
                max-width: 400px;
            }

            .popup h2 {
                font-size: 26px;
            }

            .popup p {
                font-size: 18px;
            }

            .final-message {
                font-size: 18px;
                padding: 15px 25px;
                width: 90%;
                max-width: 400px;
            }

            .message {
                font-size: 16px;
                padding: 0 10px;
            }

            .floating-heart {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 15px;
                max-height: 97vh;
            }

            h1 {
                font-size: 18px;
                margin-bottom: 15px;
            }

            .slideshow-container {
                height: 280px;
                border: 3px solid #fff;
            }

            button {
                padding: 12px 28px;
                font-size: 17px;
            }

            .button-container {
                gap: 12px;
                flex-direction: row;
                min-height: 65px;
            }

            .popup {
                padding: 25px 30px;
            }

            .popup h2 {
                font-size: 22px;
                margin-bottom: 15px;
            }

            .popup p {
                font-size: 16px;
                margin-bottom: 20px;
            }

            .popup button {
                padding: 12px 25px;
            }

            .final-message {
                font-size: 16px;
                padding: 12px 20px;
                top: 10px;
            }

            .message {
                font-size: 15px;
            }

            .celebration-heart {
                font-size: 30px;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 20px 12px;
            }

            h1 {
                font-size: 16px;
            }

            .slideshow-container {
                height: 240px;
            }

            button {
                padding: 10px 22px;
                font-size: 15px;
            }

            .message {
                font-size: 14px;
            }
            }
        }

        /* Landscape orientation on mobile */
        @media (max-height: 600px) and (orientation: landscape) {
            body {
                padding: 0;
            }

            .container {
                padding: 15px;
                max-height: 95vh;
            }

            .slideshow-container {
                height: 180px;
            }

            h1 {
                font-size: 16px;
                margin-bottom: 10px;
            }

            .button-container {
                margin-top: 15px;
                min-height: 50px;
            }

            button {
                padding: 10px 25px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Background hearts -->
    <div class="heart-container" id="heartContainer"></div>

    <!-- Main container -->
    <div class="container">
        <h1>Isn't this the most beautiful girl in the world? 💕</h1>

        <!-- Photo slideshow -->
        <div class="slideshow-container">
            <div class="slide active">
                <img src="k1.png" alt="Beautiful Girl">
            </div>
            <div class="slide">
                <img src="k2.png" alt="Beautiful Girl">
            </div>
            <div class="slide">
                <img src="k3.png" alt="Beautiful Girl">
            </div>
            <div class="slide">
                <img src="k4.png" alt="Beautiful Girl">
            </div>
            <div class="slide">
                <img src="k5.png" alt="Beautiful Girl">
            </div>
            <div class="slide">
                <img src="k6.png" alt="Beautiful Girl">
            </div>
        </div>

        <!-- Message display -->
        <div class="message" id="message"></div>

        <!-- Buttons -->
        <div class="button-container">
            <button id="yesBtn"><span>YES ❤️</span></button>
            <button id="noBtn"><span>NO 😒</span></button>
        </div>
    </div>

    <!-- Popup -->
    <div class="overlay" id="overlay"></div>
    <div class="popup" id="popup">
        <h2>Yay! 🎉</h2>
        <p id="popupMessage">You have great taste! 😊</p>
        <button onclick="closePopup()">Close</button>
    </div>

    <!-- Final message -->
    <div class="final-message" id="finalMessage">
        Someone here thinks you're absolutely amazing ❤️
    </div>

    <script>
        // ==================== SLIDESHOW ====================
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        function showNextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        // Change slide every 5 seconds
        setInterval(showNextSlide, 5000);

        // ==================== FLOATING HEARTS BACKGROUND ====================
        function createFloatingHearts() {
            const heartContainer = document.getElementById('heartContainer');
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('floating-heart');
                heart.innerHTML = ['❤️', '💕', '💖', '💗', '💝'][Math.floor(Math.random() * 5)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 3 + 5) + 's';
                heartContainer.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 8000);
            }, 800);
        }

        createFloatingHearts();

        // Create sparkles
        function createSparkles() {
            for (let i = 0; i < 30; i++) {
                const sparkle = document.createElement('div');
                sparkle.classList.add('sparkle');
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.animationDelay = Math.random() * 2 + 's';
                sparkle.style.animationDuration = (Math.random() * 2 + 1) + 's';
                document.querySelector('.heart-container').appendChild(sparkle);
            }
        }

        createSparkles();

        // Create glowing orbs
        function createGlowingOrbs() {
            for (let i = 0; i < 5; i++) {
                const orb = document.createElement('div');
                orb.classList.add('orb');
                const size = Math.random() * 150 + 100;
                orb.style.width = size + 'px';
                orb.style.height = size + 'px';
                orb.style.left = Math.random() * 100 + '%';
                orb.style.top = Math.random() * 100 + '%';
                orb.style.animationDelay = Math.random() * 5 + 's';
                orb.style.animationDuration = (Math.random() * 10 + 10) + 's';
                document.querySelector('.heart-container').appendChild(orb);
            }
        }

        createGlowingOrbs();

        // ==================== NO BUTTON MOVEMENT ====================
        const noBtn = document.getElementById('noBtn');
        const message = document.getElementById('message');

        const funnyMessages = [
            "Hey! Look carefully again 😄",
            "Are you sure? Beauty overload detected!",
            "I think you clicked the wrong button 😉",
            "How can anyone say no to this beauty?",
            "System error: Correct answer is YES!",
            "Oops! The NO button is broken 😅",
            "Try again! Your eyes need another look 👀",
            "Wrong answer detected! Please reconsider 💕",
            "The universe says YES! 🌟",
            "Your heart knows the right answer ❤️",
            "404: NO button not found! 🚫",
            "Come on, you know the truth! 😍",
            "Impossible to say NO to perfection! ✨"
        ];

        let lastMessageIndex = -1;

        function getRandomMessage() {
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * funnyMessages.length);
            } while (randomIndex === lastMessageIndex && funnyMessages.length > 1);
            
            lastMessageIndex = randomIndex;
            return funnyMessages[randomIndex];
        }

        function moveButton() {
            const container = document.querySelector('.container');
            
            // Move button to container if not already there
            if (noBtn.parentElement !== container) {
                container.appendChild(noBtn);
            }
            
            const containerRect = container.getBoundingClientRect();
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            // Calculate safe bounds - button can move anywhere in the entire container
            const padding = window.innerWidth < 768 ? 25 : 35;
            
            // Calculate max positions to keep button fully visible
            const maxX = containerRect.width - btnWidth - padding;
            const maxY = containerRect.height - btnHeight - padding;

            // Random position anywhere in the container
            const randomX = padding + Math.random() * (maxX - padding);
            const randomY = padding + Math.random() * (maxY - padding);

            noBtn.style.position = 'absolute';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            noBtn.style.transform = 'none'; // Reset any hover transforms

            // Show random message
            message.textContent = getRandomMessage();
        }

        // Move button on hover (desktop)
        noBtn.addEventListener('mouseenter', moveButton);

        // Move button on touch/click (mobile)
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        // Additional click handler for mobile
        noBtn.addEventListener('click', (e) => {
            e.preventDefault();
            moveButton();
        });

        // ==================== YES BUTTON ====================
        const yesBtn = document.getElementById('yesBtn');
        const popup = document.getElementById('popup');
        const overlay = document.getElementById('overlay');
        const popupMessage = document.getElementById('popupMessage');
        const finalMessage = document.getElementById('finalMessage');

        const yesMessages = [
            "You have great taste! 😊",
            "I knew you would say YES!",
            "She just became even happier because of you!",
            "Perfect choice! You're amazing! 🌟",
            "Your heart knows the truth! ❤️",
            "Brilliant answer! You're a star! ⭐"
        ];

        yesBtn.addEventListener('click', () => {
            // Show popup with random message
            popupMessage.textContent = yesMessages[Math.floor(Math.random() * yesMessages.length)];
            popup.classList.add('show');
            overlay.classList.add('show');

            // Create celebration hearts
            createCelebrationHearts();

            // Show final message after a delay
            setTimeout(() => {
                finalMessage.classList.add('show');
            }, 1000);
        });

        function closePopup() {
            popup.classList.remove('show');
            overlay.classList.remove('show');
        }

        // Close popup when clicking overlay
        overlay.addEventListener('click', closePopup);

        // ==================== CELEBRATION HEARTS ====================
        function createCelebrationHearts() {
            // Create multiple waves of hearts
            for (let wave = 0; wave < 3; wave++) {
                setTimeout(() => {
                    for (let i = 0; i < 20; i++) {
                        setTimeout(() => {
                            const heart = document.createElement('div');
                            heart.classList.add('celebration-heart');
                            const hearts = ['❤️', '💕', '💖', '💗', '💝', '💓', '🌹', '💐', '✨', '⭐', '🌟'];
                            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                            heart.style.left = Math.random() * window.innerWidth + 'px';
                            heart.style.top = window.innerHeight - 50 + 'px';
                            heart.style.fontSize = (Math.random() * 30 + 40) + 'px';
                            document.body.appendChild(heart);

                            setTimeout(() => {
                                heart.remove();
                            }, 3000);
                        }, i * 80);
                    }
                }, wave * 600);
            }
            
            // Add confetti effect
            createConfetti();
        }

        // Confetti effect
        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.style.position = 'fixed';
                    confetti.style.width = '10px';
                    confetti.style.height = '10px';
                    confetti.style.background = ['#ff6ec4', '#7873f5', '#4facfe', '#00f2fe', '#f093fb', '#ffd700'][Math.floor(Math.random() * 6)];
                    confetti.style.left = Math.random() * window.innerWidth + 'px';
                    confetti.style.top = '-20px';
                    confetti.style.borderRadius = '50%';
                    confetti.style.pointerEvents = 'none';
                    confetti.style.zIndex = '1001';
                    confetti.style.boxShadow = '0 0 10px currentColor';
                    document.body.appendChild(confetti);

                    // Animate confetti falling
                    let pos = -20;
                    let leftPos = parseFloat(confetti.style.left);
                    const fall = setInterval(() => {
                        if (pos > window.innerHeight) {
                            clearInterval(fall);
                            confetti.remove();
                        } else {
                            pos += 5;
                            leftPos += (Math.random() - 0.5) * 5;
                            confetti.style.top = pos + 'px';
                            confetti.style.left = leftPos + 'px';
                            confetti.style.transform = `rotate(${pos * 2}deg)`;
                        }
                    }, 30);
                }, i * 50);
            }
        }
    </script>
</body>
</html>
